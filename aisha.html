<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aisha Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
--bg:#111;
--text:#fff;
--card:#1b1b1b;
--accent:#AF2323;
--para:#d9d9d9;

background:var(--bg);
color:var(--text);
transition:.4s;
min-height:100vh;
overflow:hidden;
}

body.light{
--bg:#f5f5f5;
--text:#111;
--card:#ffffff;
--accent:#AF2323;
--para:#555;
}

header{
padding:25px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:34px;
font-weight:700;
}

.logo span{
color:var(--accent);
}

nav{
display:flex;
align-items:center;
gap:30px;
}

nav a{
text-decoration:none;
color:var(--text);
font-size:17px;
}

.toggle{
width:46px;
height:46px;
border-radius:50%;
border:none;
background:var(--card);
color:var(--text);
font-size:20px;
cursor:pointer;
}

.hero{
height:calc(100vh - 90px);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 8%;
}

.left{
max-width:600px;
}

.left h3{
font-size:42px;
margin-bottom:10px;
}

.left h1{
font-size:90px;
line-height:1;
margin-bottom:15px;
}

.left h2{
font-size:45px;
margin-bottom:25px;
height:60px;
}

.left h2 span{
color:var(--accent);
border-right:3px solid var(--accent);
padding-right:8px;
animation:blink .7s infinite;
}

.left p{
font-size:18px;
line-height:1.8;
color:var(--para);
margin-bottom:30px;
max-width:520px;
}

.social{
display:flex;
gap:14px;
margin-bottom:30px;
}

.social a{
width:48px;
height:48px;
border-radius:50%;
border:2px solid var(--accent);
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
color:var(--text);
font-weight:600;
transition:.3s;
}

.social a:hover{
background:var(--accent);
color:white;
transform:translateY(-5px);
}

.btn{
display:inline-block;
padding:14px 35px;
border:2px solid var(--accent);
border-radius:40px;
text-decoration:none;
color:var(--text);
font-weight:600;
transition:.3s;
}

.btn:hover{
background:var(--accent);
color:white;
}

.circle{
width:460px;
height:460px;
border-radius:50%;
overflow:hidden;
border:4px solid var(--accent);
box-shadow:0 0 20px var(--accent),
0 0 60px rgba(175,35,35,.5);
}

.circle img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes blink{
50%{border-color:transparent;}
}

@media(max-width:1100px){

body{
overflow:auto;
}

.hero{
flex-direction:column-reverse;
text-align:center;
height:auto;
padding:40px 8%;
gap:40px;
}

.left h1{
font-size:65px;
}

.left h2{
font-size:34px;
}

.left h3{
font-size:30px;
}

.left p{
margin:auto;
margin-bottom:30px;
}

.social{
justify-content:center;
}

.circle{
width:320px;
height:320px;
}

nav a{
display:none;
}
}

</style>
</head>

<body>

<header>

<div class="logo"><span>Al Muwakkar</span></div>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Skills</a>
<a href="#">Portfolio</a>
<a href="#">Contact</a>

<button class="toggle" onclick="mode()">☀</button>
</nav>

</header>

<section class="hero">

<div class="left">

<h3>Hello, I'm</h3>

<h1>Aisha</h1>

<h2>And I'm a <span id="typing"></span></h2>

<p>
I design beautiful and user-friendly websites.
My passion is creating modern digital experiences
with elegant style and smooth interaction.
</p>

<div class="social">
<a href="#">in</a>
<a href="#">#</a>
<a href="#">@</a>
</div>

<a href="#" class="btn">Download CV</a>

</div>

<div class="right">

<div class="circle">
<img src="image/aisha.png">
</div>

</div>

</section>

<script>

function mode(){
document.body.classList.toggle("light");
}

const words = ["Web Designer","UI/UX Designer"];
let i = 0;
let j = 0;
let current = "";
let isDeleting = false;

function type(){

current = words[i];

if(isDeleting){
j--;
}else{
j++;
}

document.getElementById("typing").textContent = current.substring(0,j);

if(!isDeleting && j == current.length){
isDeleting = true;
setTimeout(type,1000);
return;
}

if(isDeleting && j == 0){
isDeleting = false;
i++;
if(i == words.length){
i = 0;
}
}

setTimeout(type,isDeleting ? 60 : 120);
}

type();

</script>

</body>
</html>
