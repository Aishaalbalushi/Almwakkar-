<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet Our Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{min-height:100vh;background:radial-gradient(circle at top left,#AF2323,transparent 30%),radial-gradient(circle at bottom right,#DDD3C0,transparent 30%),#1b1212;color:#fff;display:flex;align-items:center;justify-content:center;padding:40px}
.wrapper{width:100%;max-width:1200px;background:#231818;border:1px solid rgba(255,255,255,.12);border-radius:28px;padding:60px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.top{display:flex;justify-content:space-between;gap:30px;align-items:end;flex-wrap:wrap;margin-bottom:40px}
.small{font-size:12px;letter-spacing:2px;color:#CFC6B7}
h1{font-size:54px;line-height:1.1}.accent{color:#AF2323}
.desc{max-width:420px;color:#DDD3C0;line-height:1.8}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{text-decoration:none;color:#fff;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.08);border-radius:24px;overflow:hidden;transition:.35s;position:relative}
.card:hover{transform:translateY(-10px);box-shadow:0 0 30px rgba(175,35,35,.25)}
.card img{width:100%;height:360px;object-fit:cover;display:block}
.info{padding:18px}
.role{font-size:13px;color:#AF2323;margin-bottom:8px}
.name{font-size:30px;font-weight:700}
.view{font-size:14px;color:#ddd;margin-top:6px}
@media(max-width:900px){.cards{grid-template-columns:1fr}.wrapper{padding:30px}h1{font-size:38px}.card img{height:300px}}
</style>
</head>
<body>
<div class="wrapper">
<div class="top">
<div>
<div class="small">[ OUR TEAM ]</div>
<h1>Meet the <span class="accent">Experts</span></h1>
</div>
</div>
<div class="cards">
<a class="card" href="aisha.html">
<img src="image/aisha.png" alt="Aisha">
<div class="info">
<div class="role">UI / UX Designer</div>
<div class="name">Aisha</div>
</div>
</a>
<a class="card" href="nouf.html">
<img src="image/nouf.png" alt="Nouf">
<div class="info">
<div class="role">Back-End Developer</div>
<div class="name">Nouf</div>
</div>
</a>
<a class="card" href="fatima.html">
<img src="" alt="Fatima">
<div class="info">
<div class="role">System Aanlysit</div>
<div class="name">Fatima</div>
</div>
</a>
</div>
</div>
</body>
</html>
